apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx-pod
spec:
  containers:
  - image: "nginx:stable-alpine"
    name: nginx-pod
    ports:
      - containerPort: 80
        name: http
    volumeMounts:
      - name: nginx-config
        mountPath: /etc/nginx/conf.d/default.conf
        subPath: nginx.conf
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
  - image: "nginx/nginx-prometheus-exporter:0.11.0"
    name: nginx-exporter
    args:
      - "-nginx.scrape-uri=http://localhost/metrics"
    ports:
      - containerPort: 9113
        name: metrics
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m" 
  volumes: 
  - configMap:
      defaultMode: 420
      name: nginx-config
    name: nginx-config
